<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>The Dominion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e0d; --panel:#141715; --panel2:#1c201e; --solid:#181c1a;
    --ink:#eceeed; --ink2:#a3aca7; --muted:#6e7873;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.16);
    --accent:#3ddba0; --accent-dim:#22946b; --accent-soft:rgba(61,219,160,.12);
    --accent-ink:#07231a;
    --good:#3ddba0; --bad:#f0716b; --warn:#e0b458;
    --c1:#3ddba0; --c2:#5aa2f0; --c3:#e0b458; --c4:#b08df5;
    --glow:none;
    --mono:"Inter",system-ui,sans-serif;
    --disp:"Inter",system-ui,sans-serif;
    --serif:"Instrument Serif",Georgia,serif;
    --r:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font:14.5px/1.5 var(--disp);
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{display:flex; min-height:100vh; position:relative; z-index:1}
  /* ---------- auth ---------- */
  .authwrap{min-height:100vh; display:grid; place-items:center; padding:20px; position:relative; z-index:1}
  .authcard{width:min(390px,100%); background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:34px 30px; position:relative}
  .authcard h1{font:italic 400 34px/1 var(--serif); margin:2px 0 0; letter-spacing:.01em}
  .k{font:500 10.5px var(--disp); color:var(--muted); text-transform:uppercase; letter-spacing:.22em}
  .authcard form{display:flex; flex-direction:column; gap:10px; margin-top:22px}
  .authmsg{font:12.5px var(--disp); margin-top:12px; color:var(--ink2); min-height:18px}
  .authmsg.err{color:var(--bad)}
  /* ---------- nav ---------- */
  nav{
    width:216px; flex:0 0 216px; padding:24px 14px; border-right:1px solid var(--line);
    display:flex; flex-direction:column; gap:3px; position:sticky; top:0; height:100vh;
    background:#101312;
  }
  .brand{padding:2px 12px 20px}
  .brand h1{font:italic 400 26px/1.1 var(--serif); margin:2px 0 0; letter-spacing:.01em}
  .navbtn{
    display:flex; align-items:center; gap:11px; padding:10px 12px;
    border:1px solid transparent; border-radius:11px; background:none; color:var(--ink2);
    font:500 14px var(--disp); letter-spacing:.01em;
    cursor:pointer; text-align:left; width:100%; position:relative;
  }
  .navbtn svg{width:16px; height:16px; flex:0 0 16px}
  .navbtn:hover{color:var(--ink); background:rgba(255,255,255,.05)}
  .navbtn.on{color:var(--accent); background:var(--accent-soft)}
  .navfoot{margin-top:auto; display:flex; flex-direction:column; gap:6px; padding:0 4px}
  .sync{font:11px var(--disp); color:var(--muted); padding:2px 8px 8px; display:flex; align-items:center; gap:7px; text-transform:uppercase; letter-spacing:.14em}
  .sync .dot{width:7px; height:7px; border-radius:50%; background:var(--good); flex:0 0 7px}
  .sync.busy .dot{background:var(--warn)}
  .sync.err .dot{background:var(--bad)}
  .ghost{
    border:1px solid var(--line2); border-radius:999px; background:transparent; color:var(--ink2);
    padding:7px 14px; font:500 12.5px var(--disp); letter-spacing:.01em; cursor:pointer;
  }
  .ghost:hover{color:var(--ink); border-color:rgba(255,255,255,.3)}
  /* ---------- main ---------- */
  main{flex:1; min-width:0; padding:22px clamp(16px,4vw,44px) 90px; max-width:1120px}
  .sysline{
    font:500 10.5px var(--disp); color:var(--muted); letter-spacing:.16em; text-transform:uppercase;
    display:flex; gap:14px; flex-wrap:wrap; border-bottom:1px solid var(--line); padding-bottom:10px; margin-bottom:18px;
  }
  .sysline b{color:var(--ink2); font-weight:500}
  .pagehead{display:flex; align-items:baseline; justify-content:space-between; gap:14px; flex-wrap:wrap; margin:8px 0 20px}
  .pagehead h2{font:italic 400 40px/1 var(--serif); margin:0; letter-spacing:.01em}
  .pagehead .sub{font:500 10.5px var(--disp); color:var(--muted); letter-spacing:.16em}
  .grid{display:grid; gap:16px; grid-template-columns:repeat(12,1fr)}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
    padding:20px 22px; grid-column:span 12; min-width:0; position:relative;
  }
  .card h3{
    margin:0 0 14px; font:italic 400 20px/1.2 var(--serif); color:var(--ink);
    letter-spacing:.01em; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;
  }
  .card h3 .act{font-style:normal}
  @media(min-width:880px){ .c6{grid-column:span 6} .c4{grid-column:span 4} .c8{grid-column:span 8} }
  .stats{display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); grid-column:span 12}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; position:relative}
  .stat .lbl{font:500 10px var(--disp); color:var(--muted); text-transform:uppercase; letter-spacing:.18em}
  .stat .val{font:600 22px/1.3 var(--disp); color:var(--ink); margin-top:3px; font-variant-numeric:tabular-nums}
  .stat .hint{font:11.5px var(--disp); color:var(--muted)}
  .num{font-family:var(--disp); font-weight:500; font-variant-numeric:tabular-nums}
  .up{color:var(--good)} .down{color:var(--bad)}
  ul.plain{list-style:none; margin:0; padding:0; display:flex; flex-direction:column}
  ul.plain li{display:flex; align-items:center; gap:10px; padding:8px 2px; border-bottom:1px solid var(--line)}
  ul.plain li:last-child{border-bottom:none}
  .check{
    width:19px; height:19px; flex:0 0 19px; border:1.5px solid var(--muted); border-radius:6px;
    background:none; cursor:pointer; display:grid; place-items:center; color:transparent; padding:0;
  }
  .check.done{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
  .check svg{width:12px; height:12px}
  li .txt{flex:1; min-width:0; overflow-wrap:anywhere}
  li .txt.done{color:var(--muted); text-decoration:line-through}
  .del{border:none; background:none; color:var(--muted); cursor:pointer; font-size:15px; padding:2px 6px; opacity:.5; border-radius:6px}
  li:hover .del,.rowhover:hover .del,tr:hover .del{opacity:1}
  .del:hover{color:var(--bad)}
  .meta{font:12px var(--disp); color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums}
  .addrow{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}
  input,select,textarea{
    font:400 14px var(--disp); color:var(--ink); background:var(--panel2); border:1px solid var(--line);
    padding:8px 12px; min-width:0; border-radius:10px;
  }
  input::placeholder,textarea::placeholder{color:var(--muted)}
  input:focus,select:focus,textarea:focus,button:focus-visible{outline:1.5px solid var(--accent); outline-offset:1px}
  input[type=number]{width:104px; font-size:13.5px; font-variant-numeric:tabular-nums}
  input[type=date]{width:150px; font-size:13.5px; color-scheme:dark}
  select{text-transform:none}
  .grow{flex:1 1 140px}
  .btn{
    background:var(--accent); color:var(--accent-ink); border:1px solid var(--accent); border-radius:999px;
    padding:8px 18px; font:600 13px var(--disp); letter-spacing:.01em; cursor:pointer;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn.small,.ghost.small{padding:4px 12px; font-size:11.5px}
  .bar{height:6px; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; flex:1}
  .bar i{display:block; height:100%; background:var(--accent); border-radius:999px}
  .bar i.over{background:var(--bad)}
  input[type=range]{accent-color:var(--accent); width:100%; padding:0; background:none; border:none}
  .goal{padding:12px 2px; border-bottom:1px solid var(--line)}
  .goal:last-child{border-bottom:none}
  .goal .top{display:flex; align-items:baseline; gap:10px}
  .goal .top b{flex:1; font-weight:600; overflow-wrap:anywhere}
  .goal .row2{display:flex; align-items:center; gap:12px; margin-top:6px}
  .pct{font:500 13px var(--disp); width:44px; text-align:right; color:var(--accent); font-variant-numeric:tabular-nums}
  .pill{font:500 11.5px var(--disp); letter-spacing:.02em; padding:3px 12px; white-space:nowrap; border:1px solid var(--line2); border-radius:999px; cursor:pointer; background:transparent; color:var(--ink2); text-transform:capitalize}
  .pill.active{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
  .pill.done{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
  .networth .big{font:600 clamp(30px,4vw,40px)/1.15 var(--disp); letter-spacing:-.02em; font-variant-numeric:tabular-nums}
  .acct{display:flex; align-items:center; gap:10px; padding:8px 2px; border-bottom:1px solid var(--line)}
  .acct:last-child{border-bottom:none}
  .dot{width:8px; height:8px; flex:0 0 8px; border-radius:50%}
  .acct input.val{width:120px; text-align:right; padding:4px 8px; background:none; border-color:transparent}
  .acct input.val:hover,.acct input.val:focus{background:var(--panel2); border-color:var(--line)}
  .legend{display:flex; flex-direction:column; gap:7px; font-size:13.5px}
  .legend .lrow{display:flex; align-items:center; gap:8px}
  .legend .lrow span:last-child{margin-left:auto}
  .donutwrap{display:flex; align-items:center; gap:22px; flex-wrap:wrap}
  .chart{position:relative; margin-top:6px}
  .chart svg{display:block; width:100%; height:auto}
  .tip{
    position:absolute; pointer-events:none; background:var(--solid); color:var(--ink); border:1px solid var(--line2); border-radius:8px;
    font:12px/1.4 var(--disp); padding:5px 10px; font-variant-numeric:tabular-nums;
    transform:translate(-50%,-118%); white-space:nowrap; display:none; z-index:3;
  }
  .empty{color:var(--muted); font:13px var(--disp); padding:14px 0; text-align:center}
  .brow{padding:9px 2px; border-bottom:1px solid var(--line)}
  .brow:last-child{border-bottom:none}
  .brow .l1{display:flex; align-items:baseline; gap:8px}
  .brow .l1 b{flex:1; font-weight:600}
  .brow .l2{display:flex; align-items:center; gap:10px; margin-top:5px}
  /* gym */
  .wo{border:1px solid var(--line); border-radius:14px; padding:13px 16px; margin-bottom:10px; background:var(--panel2)}
  .wo .whead{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .wo .whead b{flex:1; min-width:110px; font-weight:600}
  .wo.editing{border-color:var(--accent-dim)}
  .wometa{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
  .wometa label{display:flex; flex-direction:column; gap:3px; font:500 10px var(--disp); color:var(--muted); text-transform:uppercase; letter-spacing:.14em}
  .wometa input,.wometa select{padding:5px 9px; font-size:13px}
  .rating{color:var(--warn); font:12px var(--disp); letter-spacing:.05em}
  .typechip{font:500 10.5px var(--disp); border:1px solid var(--line2); border-radius:999px; color:var(--ink2); padding:2px 9px; text-transform:uppercase; letter-spacing:.08em; white-space:nowrap}
  .ex{margin-top:12px; padding-top:10px; border-top:1px dashed var(--line2)}
  .ex .exhead{display:flex; align-items:center; gap:8px}
  .ex .exhead b{flex:1; font-weight:600}
  .sets{display:flex; flex-wrap:wrap; gap:6px; margin-top:7px}
  .set{
    background:var(--panel); border:1px solid var(--line2); border-radius:999px;
    font:12.5px var(--disp); padding:3px 11px; display:flex; align-items:center; gap:6px; font-variant-numeric:tabular-nums;
  }
  .set button{border:none; background:none; color:var(--muted); cursor:pointer; padding:0 1px; font-size:13px}
  .set button:hover{color:var(--bad)}
  .set.pr{border-color:var(--accent); color:var(--accent)}
  .setform{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap}
  .setform input{width:80px; padding:5px 9px; font-size:13px}
  .chip{background:var(--panel); border:1px solid var(--line); border-radius:999px; font:12px var(--disp); padding:2px 10px; color:var(--ink2)}
  .chips{display:flex; flex-wrap:wrap; gap:5px}
  /* calendar */
  .cal{font-variant-numeric:tabular-nums}
  .cal .chead{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px}
  .cal .chead b{font:600 14px var(--disp)}
  .cal .cnav{background:none; border:1px solid var(--line2); border-radius:999px; color:var(--ink2); cursor:pointer; padding:2px 11px; font:14px var(--disp)}
  .cal .cnav:hover{color:var(--ink); border-color:rgba(255,255,255,.3)}
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px}
  .calgrid .dow{font:500 9.5px var(--disp); color:var(--muted); text-align:center; padding:3px 0; text-transform:uppercase; letter-spacing:.1em}
  .day{
    aspect-ratio:1; border:1px solid transparent; border-radius:10px; background:none; color:var(--ink2);
    font:12px var(--disp); cursor:pointer; position:relative; display:grid; place-items:center; padding:0;
  }
  .day:hover{border-color:var(--line2)}
  .day.dim{opacity:.25}
  .day.today{border-color:var(--line2); color:var(--accent)}
  .day.sel{background:var(--accent); color:var(--accent-ink)}
  .day .wdot{position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--accent)}
  .day.sel .wdot{background:var(--accent-ink)}
  .phase{border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:12px; background:var(--panel2)}
  .phase .phead{display:flex; align-items:center; gap:10px}
  .phase .phead b{flex:1; overflow-wrap:anywhere; font-weight:600}
  textarea{width:100%; min-height:110px; resize:vertical; line-height:1.55}
  table{border-collapse:collapse; width:100%; font-size:13.5px}
  th{font:500 10px var(--disp); text-transform:uppercase; letter-spacing:.16em; color:var(--muted); text-align:left; padding:6px 8px 6px 2px; border-bottom:1px solid var(--line)}
  td{padding:7px 8px 7px 2px; border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .tscroll{overflow-x:auto}
  @media(max-width:760px){
    nav{
      position:fixed; bottom:0; left:0; right:0; top:auto; height:auto; width:auto; flex:none;
      flex-direction:row; border-right:none; border-top:1px solid var(--line); background:rgba(14,17,16,.95);
      backdrop-filter:blur(10px);
      padding:6px 8px calc(6px + env(safe-area-inset-bottom)); z-index:60; justify-content:space-around;
    }
    .brand,.navfoot,.navbtn .nl{display:none}
    .navbtn{flex-direction:column; gap:3px; font-size:9px; padding:6px 10px; width:auto}
    .navbtn.on{background:none}
    .navbtn.on .nl{display:block}
    main{padding-bottom:120px}
  }
  @media(prefers-reduced-motion:no-preference){
    .bar i{transition:width .25s ease}
    .card{animation:rise .3s ease both}
    @keyframes rise{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ylqywqbnoqhthqixbbqn.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscXl3cWJub3FodGhxaXhiYnFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDE5ODYsImV4cCI6MjA5OTE3Nzk4Nn0.rlfWPmE0ghAISqv8sXwkA-zWBVwjpDYnuTjm_CkjXx4";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ---------------- helpers ---------------- */
const root = document.getElementById("root");
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Math.random().toString(36).slice(2, 9);
const iso = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const todayISO = () => iso(new Date());
const fmt$ = n => (n<0?"-":"") + "$" + Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});
const fmtDate = s => { const [y,m,d] = s.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const WOTYPES = ["Upper","Lower","Push","Pull","Legs","Full Body","Run","Cardio","Sport","Other"];

/* ---------------- data model ---------------- */
const defaults = () => ({
  daily: {}, habits: [],
  goals: [],
  finance: { accounts: [], snapshots: [], budget: [], budgetMonth: todayISO().slice(0,7), holdings: [], subs: [], finnhubKey: "" },
  fitness: { workouts: [], weights: [], templates: [] },
  dominion: { phases: [], notes: "" },
});
let D = defaults();
let tab = localStorage.getItem("mc-tab") || "today";
let editingWO = null;
let prEx = "";
let calBase = new Date(); calBase.setDate(1);   // month shown in calendar
let selDay = todayISO();                        // selected calendar day

const MODS = {
  planner:  { get: () => ({daily:D.daily, habits:D.habits}), set: v => { D.daily=v.daily||{}; D.habits=v.habits||[]; } },
  goals:    { get: () => ({list:D.goals}),                   set: v => { D.goals=v.list||[]; } },
  finance:  { get: () => D.finance,                          set: v => { D.finance=Object.assign(defaults().finance, v); } },
  fitness:  { get: () => D.fitness,                          set: v => { D.fitness=Object.assign(defaults().fitness, v); } },
  dominion: { get: () => D.dominion,                         set: v => { D.dominion=Object.assign(defaults().dominion, v); } },
};

/* ---------------- sync layer ---------------- */
let session = null, pending = {}, timers = {}, syncState = "ok";
const setSync = s => { syncState = s; const el = $(".sync"); if (el) { el.className = "sync"+(s==="busy"?" busy":s==="err"?" err":"");
  el.lastElementChild.textContent = s==="busy"?"Saving":s==="err"?"Retrying":"Synced"; } };

function save(mod, delay=250) {
  localStorage.setItem("mc-cache", JSON.stringify(serialize()));
  pending[mod] = true; setSync("busy");
  clearTimeout(timers[mod]);
  timers[mod] = setTimeout(() => flush(mod), delay);
}
async function flush(mod) {
  if (window.__TEST__) { delete pending[mod]; if (!Object.keys(pending).length) setSync("ok"); return; }
  if (!session || !pending[mod]) return;
  delete pending[mod];
  const { error } = await sb.from("app_state").upsert({
    user_id: session.user.id, module: mod, data: MODS[mod].get(), updated_at: new Date().toISOString(),
  });
  if (error) { pending[mod] = true; setSync("err"); clearTimeout(timers[mod]); timers[mod] = setTimeout(() => flush(mod), 4000); }
  else if (!Object.keys(pending).length) setSync("ok");
}
const serialize = () => Object.fromEntries(Object.entries(MODS).map(([k,m]) => [k, m.get()]));
function hydrate(obj) { for (const [k,v] of Object.entries(obj||{})) if (MODS[k] && v) MODS[k].set(v); }

/* first-run seed: Aiden's real numbers, applied once when the database is empty */
function seedData() {
  const t = todayISO();
  const ma = n => { const d = new Date(); d.setMonth(d.getMonth()-n); return iso(d); };
  const da = n => { const d = new Date(); d.setDate(d.getDate()-n); return iso(d); };
  return {
    planner: {
      daily: { [t]: [ {id:uid(),text:"Go to the gym",done:false}, {id:uid(),text:"Work on the agency",done:false} ] },
      habits: ["Gym","Agency Work","Journal","Hair Pill"].map(n=>({id:uid(),name:n,hist:{}})),
    },
    goals: { list: [
      {id:uid(), title:"$5k/month with The Dominion", due:"2026-08-31", pct:0},
      {id:uid(), title:"Net worth $15k", due:"", pct:33},
      {id:uid(), title:"180 lbs lean (from 170)", due:"", pct:0},
      {id:uid(), title:"Start running — build from 2 miles", due:"", pct:0},
    ]},
    finance: {
      accounts: [
        {id:uid(), name:"Cash", type:"Cash", value:350},
        {id:uid(), name:"Stocks / 401k", type:"Stocks", value:800},
        {id:uid(), name:"Credit card", type:"Debt", value:-8500},
      ],
      snapshots: [ {date:ma(6),total:1000}, {date:ma(3),total:3000}, {date:ma(1),total:5000}, {date:t,total:5000} ],
      budget: [], budgetMonth: t.slice(0,7),
    },
    fitness: {
      templates: [
        {id:uid(), name:"Upper Day", exs:["Smith Incline Press","Lat Pulldown","Seated Row","Lateral Raise","Bicep Curl","Tricep Pushdown"]},
        {id:uid(), name:"Lower Day", exs:["Leg Press","RDL","Leg Extension","Leg Curl","Calf Raise"]},
        {id:uid(), name:"Run", exs:["2 Mile Run"]},

function rolloverBudget() {

function advanceSubs() {  // roll past renewal dates forward one cycle at a time
  let changed = false; const t = todayISO();
  (D.finance.subs||[]).forEach(s => {
    while (s.next && s.next < t) {
      const d = new Date(s.next+"T12:00");
      if (s.cycle === "Yearly") d.setFullYear(d.getFullYear()+1);
      else {  // keep the billing day-of-month; dom 31 means "last day of the month"
        const dom = s.dom || d.getDate();
        d.setDate(1); d.setMonth(d.getMonth()+1);
        d.setDate(Math.min(dom, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()));
      }
      s.next = iso(d); changed = true;
    }
  });
  if (changed) save("finance");
}

/* ---------------- charts ---------------- */
function lineChart(points, {money=false, unit="", h=190, target=null} = {}) {
  if (points.length < 2) return `<div class="empty">Need two or more entries for a trend.</div>`;
  const W = 640, P = {t:14, r:14, b:26, l:52};
  const ys = points.map(p=>p.y);
  let lo = Math.min(...ys), hi = Math.max(...ys);
  if (target) { lo = Math.min(lo, target.v); hi = Math.max(hi, target.v); }
  if (lo === hi) { lo -= 1; hi += 1; }
  const pad = (hi-lo)*0.12; lo -= pad; hi += pad;
  const X = i => P.l + i*(W-P.l-P.r)/(points.length-1);
  const Y = v => P.t + (hi-v)*(h-P.t-P.b)/(hi-lo);
  const fv = v => money ? fmt$(v) : (Math.round(v*10)/10).toLocaleString()+unit;
  const path = points.map((p,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(p.y).toFixed(1)).join(" ");
  const area = path + ` L${X(points.length-1).toFixed(1)} ${h-P.b} L${P.l} ${h-P.b} Z`;
  const grid = [0,.5,1].map(t=>{ const v = lo+(hi-lo)*t, y = Y(v);
    return `<line x1="${P.l}" x2="${W-P.r}" y1="${y}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
      <text x="${P.l-7}" y="${y+4}" text-anchor="end" font-size="10.5" fill="${css("--muted")}" font-family="Inter,sans-serif">${fv(v)}</text>`; }).join("");
  const last = points[points.length-1];
  const ac = css("--accent");
  const xlbls = [0, points.length-1].map(i =>
    `<text x="${X(i)}" y="${h-8}" text-anchor="${i?"end":"start"}" font-size="10.5" fill="${css("--muted")}" font-family="Inter,sans-serif">${esc(fmtDate(points[i].x))}</text>`).join("");
  const dataAttr = esc(JSON.stringify(points.map((p,i)=>({cx:+X(i).toFixed(1), cy:+Y(p.y).toFixed(1), lbl:fmtDate(p.x)+" · "+fv(p.y)}))));
  const tline = target ? `<line x1="${P.l}" x2="${W-P.r}" y1="${Y(target.v)}" y2="${Y(target.v)}" stroke="${css("--warn")}" stroke-width="1" stroke-dasharray="5 4" opacity=".7"/>
      <text x="${W-P.r}" y="${Y(target.v)-5}" text-anchor="end" font-size="9.5" fill="${css("--warn")}" font-family="Inter,sans-serif" letter-spacing="2">${esc(target.label)}</text>` : "";
  return `<div class="chart" data-pts="${dataAttr}">
    <svg viewBox="0 0 ${W} ${h}" role="img" aria-label="trend chart">
      ${grid}${tline}
      <path d="${area}" fill="${ac}" opacity="0.08"/>
      <path d="${path}" fill="none" stroke="${ac}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${X(points.length-1)}" cy="${Y(last.y)}" r="4" fill="${ac}" stroke="#141715" stroke-width="2"/>
      <circle class="hoverdot" r="4" fill="${ac}" stroke="#141715" stroke-width="2" style="display:none"/>
      ${xlbls}
    </svg><div class="tip"></div></div>`;
}
function donut(items) {
  const total = items.reduce((s,i)=>s+i.value,0);
  const cols = ["--c1","--c2","--c3","--c4"];
  if (total <= 0) return `<div class="empty">Add account values to see allocation.</div>`;
  const R = 52, C = 2*Math.PI*R;
  let off = 0;
  const segs = items.filter(i=>i.value>0).map((it,i)=>{
    const frac = it.value/total, len = Math.max(frac*C - 2, 0.5);
    const s = `<circle r="${R}" cx="70" cy="70" fill="none" stroke="${css(cols[i%4])}" stroke-width="16"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
    off += frac*C; return s;
  }).join("");
  const leg = items.map((it,i)=>`<div class="lrow"><span class="dot" style="background:var(${cols[i%4]})"></span>
    <span>${esc(it.name)}</span><span class="num">${Math.round(it.value/total*100)}% · ${fmt$(it.value)}</span></div>`).join("");
  return `<div class="donutwrap"><svg viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="allocation donut">
    ${segs}<text x="70" y="66" text-anchor="middle" font-size="10" fill="${css("--muted")}" font-family="Inter,sans-serif">TOTAL</text>
    <text x="70" y="82" text-anchor="middle" font-size="13" fill="${css("--ink")}" font-family="Inter,sans-serif">${fmt$(total)}</text>
  </svg><div class="legend" style="flex:1;min-width:180px">${leg}</div></div>`;
}

function woSummary(w) {
  const sets = w.entries.reduce((s,e)=>s+e.sets.length,0);
  return `${w.entries.length} ex · ${sets} sets`;
}
function stars(r) { return r ? "★".repeat(r)+"☆".repeat(5-r) : ""; }

function calendar() {
  const y = calBase.getFullYear(), m = calBase.getMonth();
  const first = new Date(y, m, 1);
  const startDow = (first.getDay()+6)%7; // Mon=0
  const dayset = new Set(D.fitness.workouts.map(w=>w.date));
  const today = todayISO();
  let cells = "";
  const start = new Date(y, m, 1 - startDow);
  for (let i = 0; i < 42; i++) {
    const d = new Date(start); d.setDate(start.getDate()+i);
    const k = iso(d);
    const dim = d.getMonth()!==m;
    cells += `<button class="day ${dim?"dim":""} ${k===today?"today":""} ${k===selDay?"sel":""}" data-a="cal-day" data-id="${k}" aria-label="${k}">
      ${d.getDate()}${dayset.has(k)?'<span class="wdot"></span>':""}</button>`;
  }
  return `<div class="cal">
    <div class="chead">
      <button class="cnav" data-a="cal-nav" data-id="-1" aria-label="previous month">‹</button>
      <b>${first.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</b>
      <button class="cnav" data-a="cal-nav" data-id="1" aria-label="next month">›</button>
    </div>
    <div class="calgrid">
      ${["Mo","Tu","We","Th","Fr","Sa","Su"].map(d=>`<span class="dow">${d}</span>`).join("")}
      ${cells}
    </div></div>`;
}

function wireCharts() {
  document.querySelectorAll(".chart[data-pts]").forEach(ch => {
    const pts = JSON.parse(ch.dataset.pts), svg = ch.querySelector("svg"), tip = ch.querySelector(".tip"), dot = ch.querySelector(".hoverdot");
    const move = e => {
      const r = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal;
      const mx = (e.clientX - r.left) * vb.width / r.width;
      let best = pts[0]; for (const p of pts) if (Math.abs(p.cx-mx) < Math.abs(best.cx-mx)) best = p;
      dot.setAttribute("cx",best.cx); dot.setAttribute("cy",best.cy); dot.style.display = "";
      tip.textContent = best.lbl; tip.style.display = "block";
      tip.style.left = (best.cx * r.width / vb.width) + "px";
      tip.style.top = (best.cy * r.height / vb.height) + "px";
    };
    const out = () => { tip.style.display = "none"; dot.style.display = "none"; };
    svg.addEventListener("pointermove", move); svg.addEventListener("pointerleave", out);
  });
}

/* ---------------- actions ---------------- */
document.addEventListener("click", e => {
  const el = e.target.closest("[data-a]");
  if (!el || ["FORM","INPUT","TEXTAREA","SELECT"].includes(el.tagName)) return;
  const a = el.dataset.a, id = el.dataset.id;
  const acts = {
    tab: () => { tab = id; localStorage.setItem("mc-tab", tab); return "nosave"; },
    signout: () => { sb.auth.signOut(); return "skip"; },
    export: () => { const blob = new Blob([JSON.stringify(serialize(),null,2)],{type:"application/json"});
      const a2 = document.createElement("a"); a2.href = URL.createObjectURL(blob);
      a2.download = "mission-control-"+todayISO()+".json"; a2.click(); return "skip"; },
    import: () => { $("#importFile").click(); return "skip"; },
    "tg-daily": () => { const t = todayGoals().find(t=>t.id===id); t.done = !t.done; return "planner"; },
    "del-daily": () => { D.daily[todayISO()] = todayGoals().filter(t=>t.id!==id); return "planner"; },
    carry: () => { const y = new Date(); y.setDate(y.getDate()-1); const yk = iso(y);
      (D.daily[yk]||[]).filter(t=>!t.done).forEach(t=>todayGoals().push({id:uid(), text:t.text, done:false}));
      D.daily[yk] = (D.daily[yk]||[]).filter(t=>t.done); return "planner"; },
    "tg-habit": () => { const h = D.habits.find(h=>h.id===id); const k = todayISO();
      if (h.hist[k]) delete h.hist[k]; else h.hist[k] = true; return "planner"; },
    "del-habit": () => { D.habits = D.habits.filter(h=>h.id!==id); return "planner"; },
    "del-goal": () => { D.goals = D.goals.filter(g=>g.id!==id); return "goals"; },
    snap: () => { const k = todayISO(); D.finance.snapshots = D.finance.snapshots.filter(s=>s.date!==k);
      D.finance.snapshots.push({date:k, total:netWorth()}); D.finance.snapshots.sort((a,b)=>a.date.localeCompare(b.date)); return "finance"; },
    "del-acct": () => { D.finance.accounts = D.finance.accounts.filter(x=>x.id!==id); return "finance"; },
    "del-budget": () => { D.finance.budget = D.finance.budget.filter(x=>x.id!==id); return "finance"; },
    "del-hold": () => { D.finance.holdings = D.finance.holdings.filter(x=>x.id!==id); return "finance"; },
    "del-sub": () => { D.finance.subs = D.finance.subs.filter(x=>x.id!==id); return "finance"; },
    quotes: () => { refreshQuotes(); return "skip"; },
    /* gym */
    "cal-nav": () => { calBase.setMonth(calBase.getMonth() + +id); return "nosave"; },
    "cal-day": () => { selDay = id; editingWO = null; return "nosave"; },
    "goto-day": () => { selDay = id; editingWO = null;
      calBase = new Date(+id.slice(0,4), +id.slice(5,7)-1, 1); return "nosave"; },
    "start-wo": () => { const w = {id:uid(), date:selDay, name:"Workout", type:"", rating:0, notes:"", entries:[]};
      D.fitness.workouts.push(w); editingWO = w.id; return "fitness"; },
    "start-tpl": () => { const t = D.fitness.templates.find(t=>t.id===id);
      const w = {id:uid(), date:selDay, name:t.name, type:"", rating:0, notes:"", entries:t.exs.map(ex=>({id:uid(), ex, sets:[]}))};
      D.fitness.workouts.push(w); editingWO = w.id; return "fitness"; },
    "edit-wo": () => { editingWO = id; return "nosave"; },
    "finish-wo": () => { editingWO = null; return "nosave"; },
    "del-wo": () => { if (!confirm("Delete this workout?")) return "skip";
      D.fitness.workouts = D.fitness.workouts.filter(w=>w.id!==id); if (editingWO===id) editingWO = null; return "fitness"; },
    "del-ex": () => { const w = D.fitness.workouts.find(w=>w.id===el.dataset.w);
      w.entries = w.entries.filter(en=>en.id!==id); return "fitness"; },
    "del-set": () => { const w = D.fitness.workouts.find(w=>w.id===el.dataset.w);
      const en = w.entries.find(en=>en.id===el.dataset.e); en.sets.splice(+id,1); return "fitness"; },
    "del-tpl": () => { D.fitness.templates = D.fitness.templates.filter(t=>t.id!==id); return "fitness"; },
    "tpl-del-ex": () => { const t = D.fitness.templates.find(t=>t.id===id); t.exs.splice(+el.dataset.i,1); return "fitness"; },
    "cycle-phase": () => { const p = D.dominion.phases.find(p=>p.id===id);
      p.status = {planned:"active", active:"done", done:"planned"}[p.status]; return "dominion"; },
    "del-phase": () => { if (!confirm("Delete this phase and its tasks?")) return "skip";
      D.dominion.phases = D.dominion.phases.filter(p=>p.id!==id); return "dominion"; },
    "tg-task": () => { const p = D.dominion.phases.find(p=>p.id===el.dataset.p);
      const t = p.tasks.find(t=>t.id===id); t.done = !t.done; return "dominion"; },
    "del-task": () => { const p = D.dominion.phases.find(p=>p.id===el.dataset.p);
      p.tasks = p.tasks.filter(t=>t.id!==id); return "dominion"; },
  };
  if (!acts[a]) return;
  const mod = acts[a]();
  if (mod === "skip") return;
  if (mod !== "nosave") save(mod);
  render();
});

document.addEventListener("submit", async e => {
  const f = e.target.closest("form[data-a]"); if (!f) return;
  e.preventDefault();
  const v = n => f.elements[n]?.value.trim();
  if (f.dataset.a === "auth") {
    const mode = e.submitter?.dataset.mode || "in";
    const email = v("email"), pw = f.elements.pw.value;
    renderAuth("Working…");
    if (mode === "up") {
      const { data, error } = await sb.auth.signUp({email, password:pw});
      if (error) renderAuth(error.message, true);
      else if (!data.session) renderAuth("Account created. Check your email (and spam) for a confirmation link, then sign in.");
    } else {
      const { error } = await sb.auth.signInWithPassword({email, password:pw});
      if (error) renderAuth(error.message, true);
    }
    return;
  }
  const acts = {
    "add-daily": () => { todayGoals().push({id:uid(), text:v("text"), done:false}); return "planner"; },
    "add-habit": () => { D.habits.push({id:uid(), name:v("name"), hist:{}}); return "planner"; },
    "add-goal": () => { D.goals.push({id:uid(), title:v("title"), due:v("due")||"", pct:0}); return "goals"; },
    "add-acct": () => { D.finance.accounts.push({id:uid(), name:v("name"), type:v("type"), value:+v("value")||0}); return "finance"; },
    "add-budget": () => { D.finance.budget.push({id:uid(), cat:v("cat"), plan:+v("plan")||0, spent:0}); return "finance"; },
    "add-hold": () => { D.finance.holdings.push({id:uid(), ticker:v("ticker").toUpperCase(), shares:+v("shares")||0, price:+v("price")||0, prev:0, updated:""});
      if (D.finance.finnhubKey) setTimeout(refreshQuotes, 50); return "finance"; },
    "add-sub": () => { const next = v("next")||"";
      D.finance.subs.push({id:uid(), name:v("name"), amt:+v("amt")||0, cycle:v("cycle"), next, dom:+next.slice(8,10)||0}); return "finance"; },
    "fin-key": () => { D.finance.finnhubKey = v("key"); setTimeout(refreshQuotes, 50); return "finance"; },
    spend: () => { const b = D.finance.budget.find(b=>b.id===f.dataset.id); b.spent += +v("amt")||0; return "finance"; },
    "add-weight": () => { const k = v("date")||todayISO();
      D.fitness.weights = D.fitness.weights.filter(w=>w.date!==k);
      D.fitness.weights.push({date:k, lbs:+v("lbs")}); return "fitness"; },
    "add-ex": () => { const w = D.fitness.workouts.find(w=>w.id===f.dataset.w);
      w.entries.push({id:uid(), ex:v("ex"), sets:[]}); return "fitness"; },
    "add-set": () => { const w = D.fitness.workouts.find(w=>w.id===f.dataset.w);
      const en = w.entries.find(en=>en.id===f.dataset.e);
      en.sets.push({w:+v("w")||0, r:+v("r")||0}); return "fitness"; },
    "add-tpl": () => { D.fitness.templates.push({id:uid(), name:v("name"),
      exs:v("exs").split(",").map(s=>s.trim()).filter(Boolean)}); return "fitness"; },
    "tpl-add-ex": () => { D.fitness.templates.find(t=>t.id===f.dataset.id).exs.push(v("ex")); return "fitness"; },
    "add-task": () => { D.dominion.phases.find(p=>p.id===f.dataset.p).tasks.push({id:uid(), text:v("text"), done:false}); return "dominion"; },
    "add-phase": () => { D.dominion.phases.push({id:uid(), name:v("name"), status:"planned", tasks:[]}); return "dominion"; },
  };
  if (acts[f.dataset.a]) { const mod = acts[f.dataset.a](); save(mod); render(); }
});

document.addEventListener("input", e => {
  const el = e.target;
  if (el.dataset.a === "pct-goal") { const g = D.goals.find(g=>g.id===el.dataset.id);
    g.pct = +el.value; el.closest(".row2").querySelector(".pct").textContent = g.pct+"%"; save("goals", 600); }
  if (el.dataset.a === "dom-notes") { D.dominion.notes = el.value; save("dominion", 800); }
  if (el.dataset.a === "wo-field" && ["name","notes"].includes(el.dataset.f)) {
    const w = D.fitness.workouts.find(w=>w.id===el.dataset.id);
    w[el.dataset.f] = el.value; save("fitness", 700);
  }
});
document.addEventListener("change", e => {
  const el = e.target;
  if (el.dataset.a === "acct-val") { const a = D.finance.accounts.find(a=>a.id===el.dataset.id);
    a.value = +el.value||0; save("finance"); render(); }
  if (el.dataset.a === "hold-field") { const hd = D.finance.holdings.find(h=>h.id===el.dataset.id);
    hd[el.dataset.f] = +el.value||0; save("finance"); render(); }
  if (el.dataset.a === "pct-goal") render();
  if (el.dataset.a === "pr-ex") { prEx = el.value; render(); }
  if (el.dataset.a === "wo-field") {
    const w = D.fitness.workouts.find(w=>w.id===el.dataset.id);
    const f = el.dataset.f;
    if (f === "rating") w.rating = +el.value||0;
    else if (f === "date") { w.date = el.value || w.date; selDay = w.date; }
    else w[f] = el.value;
    save("fitness"); render();
  }
});

$("#importFile").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const rd = new FileReader();
  rd.onload = () => { try { const inc = JSON.parse(rd.result);
      if (!inc.finance && !inc.fitness) throw 0;
      hydrate(inc); Object.keys(MODS).forEach(m => save(m));
      render();
    } catch { alert("That file doesn't look like a Mission Control backup."); }
    e.target.value = ""; };
  rd.readAsText(file);
});

document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState === "visible" && session && !Object.keys(pending).length) {
    await loadAll(); render();
  }
});

/* ---------------- boot ---------------- */
let booted = false;
sb.auth.onAuthStateChange(async (_ev, s) => {
  if (window.__TEST__) return;
  const wasIn = !!session; session = s;
  if (s && (!wasIn || !booted)) {
    booted = true;
    try { hydrate(JSON.parse(localStorage.getItem("mc-cache")||"null")||{}); } catch {}
    render();
    await loadAll(); render();
  } else if (!s) { booted = false; render(); }
});
renderAuth();
